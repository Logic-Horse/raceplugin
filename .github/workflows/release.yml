name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package extension
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(grep -m1 '"version"' extension/manifest.json | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match manifest version ${MANIFEST_VERSION}"
            exit 1
          fi
          ./scripts/package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Logic_BettingAssistant_*.zip
          overwrite_files: true
          fail_on_unmatched_files: true
